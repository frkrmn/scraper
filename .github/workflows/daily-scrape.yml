name: Daily Crypto Data Scrape

on:
  schedule:
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run KMquant scraper
        run: npx tsx scrape-kmquant.ts
        env:
          KMQUANT_EMAIL: ${{ secrets.KMQUANT_EMAIL }}
          KMQUANT_PASSWORD: ${{ secrets.KMQUANT_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run NewHedge scraper
        run: npx tsx scrape-newhedge.ts

      - name: Run Amsflow scraper
        run: npx tsx scrape-amsflow.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/latest.json public/api/newhedge.json public/api/amsflow.json
          git diff --staged --quiet || git commit -m "Daily data update"
          git push
